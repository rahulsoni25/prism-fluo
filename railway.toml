[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
# Init DB tables (idempotent IF NOT EXISTS), then start the app
startCommand = "node scripts/init_db.mjs && npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "prism-fluo"

[services.variables]
NODE_ENV = "production"
PORT     = "3000"
# DATABASE_URL must be set in Railway dashboard → Variables
# Either hard-code it or use the Railway reference syntax:
#   DATABASE_URL = "${{Postgres.DATABASE_URL}}"
# PGSSLMODE = "require"   ← set this too if Railway Postgres requires it
