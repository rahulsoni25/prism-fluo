[build]
# Docker builder — deterministic, no hidden Nixpacks install steps,
# no BuildKit cache mount conflicts. Dockerfile is in the repo root.
builder = "DOCKERFILE"
# No buildCommand — the Dockerfile owns every step.

[deploy]
# standalone output uses node server.js, not `npm start`
# DB init runs first (idempotent CREATE TABLE IF NOT EXISTS)
startCommand = "node scripts/init_db.mjs && node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "prism-fluo"

[services.variables]
NODE_ENV = "production"
PORT     = "3000"
HOSTNAME = "0.0.0.0"
# DATABASE_URL  — set in Railway dashboard → Variables (do not hard-code here)
# GEMINI_API_KEY — set in Railway dashboard → Variables
