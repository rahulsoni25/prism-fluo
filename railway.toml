[build]
# Docker builder — deterministic, no hidden Nixpacks install steps,
# no BuildKit cache mount conflicts. Dockerfile is in the repo root.
builder = "DOCKERFILE"
# No buildCommand — the Dockerfile owns every step.

[deploy]
# standalone output uses node server.js, not `npm start`
# DB init runs first (idempotent CREATE TABLE IF NOT EXISTS)
startCommand = "node scripts/start.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway polls this URL after the container starts. The deploy is only
# promoted to Active when /api/health returns 200. If health never passes,
# Railway shows the deploy as FAILED (not the misleading "Completed") and
# the restartPolicy above kicks in. /api/health verifies a live DB ping,
# so a missing DATABASE_URL or unreachable Postgres will surface here.
healthcheckPath    = "/api/health"
healthcheckTimeout = 60

[[services]]
name = "prism-fluo"

[services.variables]
NODE_ENV = "production"
PORT     = "3000"
HOSTNAME = "0.0.0.0"
# DATABASE_URL    — set in Railway dashboard → Variables (do not hard-code here)
# GEMINI_API_KEY  — set in Railway dashboard → Variables
# OLLAMA_API_KEY  — set in Railway dashboard → Variables (powers /api/copilot)
# OLLAMA_BASE_URL — optional, defaults to https://ollama.com (Ollama Cloud)
# OLLAMA_MODEL    — optional, defaults to gpt-oss:120b
#
# ── Auth ──
# AUTH_SECRET           — REQUIRED in production; sign sessions. Generate via `openssl rand -base64 32`.
# AUTH_GOOGLE_ID        — optional; enables Google OAuth on /login
# AUTH_GOOGLE_SECRET    — optional; pair with AUTH_GOOGLE_ID
# AUTH_LINKEDIN_ID      — optional; enables LinkedIn OAuth
# AUTH_LINKEDIN_SECRET  — optional; pair with AUTH_LINKEDIN_ID
# AUTH_DEMO_OPEN        — optional 'false' to disable demo email/password login
#                          once OAuth is wired (default 'true' so the demo keeps working)
