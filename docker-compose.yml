services:
  postgres:
    image: postgres:16-alpine
    container_name: prism-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    ports:
      - "5432:5432"
    volumes:
      - prism_pgdata:/var/lib/postgresql/data

volumes:
  prism_pgdata:
